
services:
  # -----------------------------
  # Laravel App (PHP-FPM)
  # -----------------------------
  app:
   build:
    context: .
    dockerfile: Dockerfile
   container_name: laravel_app
   volumes:
    - ./src:/var/www/html
   ports:
    - "8000:8000"
   env_file:
    - ./src/.env
   depends_on:
    - postgres
    - redis
    - soketi

  # -----------------------------
  # Nginx Web Server
  # -----------------------------
  nginx:
    image: nginx:1.25-alpine
    container_name: nginx_server
    ports:
      - "80:80"
    volumes:
      - ./src:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  # -----------------------------
  # Node / Vite (Frontend)
  # -----------------------------
  node:
    image: node:20-alpine
    container_name: node_dev
    working_dir: /var/www/html
    volumes:
      - ./src:/var/www/html
    # Build/watch frontend assets into `./src/public/` for Nginx to serve.
    command: sh -c "npm install && npm run watch"
    environment:
      CHOKIDAR_USEPOLLING: "true"

  # -----------------------------
  # PostgreSQL Database
  # -----------------------------
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_DB: laravel
      POSTGRES_USER: laravel_user
      POSTGRES_PASSWORD: secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  # -----------------------------
  # Redis
  # -----------------------------
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"

  # -----------------------------
  # Soketi WebSocket Server
  # -----------------------------
  soketi:
   image: quay.io/soketi/soketi:latest-16-alpine
   container_name: soketi
   ports:
    - "0.0.0.0:6001:6001"   # ✅ explicitly bind to all interfaces
    - "0.0.0.0:9601:9601"
   environment:
    SOKETI_DEFAULT_APP_ID: "1"
    SOKETI_DEFAULT_APP_KEY: local
    SOKETI_DEFAULT_APP_SECRET: local_secret
    SOKETI_DEBUG: "1"         # ✅ enable debug logs temporarily

volumes:
  postgres_data: